name: Publish Architecture Documentation

on:
  push:
    branches:
      - master
    paths:
      - "architecture/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  pull_request:
    branches:
      - master
    paths:
      - "architecture/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Structurizr workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate workspace.dsl
        run: |
          docker run --rm \
            --user 0:0 \
            -v "${{ github.workspace }}:/usr/local/structurizr" \
            structurizr/structurizr:latest \
            validate \
            -workspace /usr/local/structurizr/architecture/workspace.dsl

  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Export Structurizr static site
        run: |
          rm -rf docs/structurizr
          mkdir -p docs/structurizr

          docker run --rm \
            --user 0:0 \
            -v "${{ github.workspace }}:/usr/local/structurizr" \
            structurizr/structurizr:latest \
            export \
            -workspace /usr/local/structurizr/architecture/workspace.dsl \
            -format static \
            -output /usr/local/structurizr/docs/structurizr

          sudo chown -R "$(id -u):$(id -g)" docs/structurizr
          chmod -R a+rX docs/structurizr

      - name: Build MkDocs site
        run: |
          mkdocs build --strict --site-dir site

      - name: Verify generated site
        run: |
          test -f site/index.html
          test -f site/structurizr/index.html
          find site -maxdepth 4 -type f -print

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
